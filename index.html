<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <title>Treinador</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="wrap">
      <span style="font-size:20px">⚽</span>
      <h1 id="titulo">Treinador</h1>
      <span id="badge-off" class="badge-off" hidden>offline</span>
    </div>
  </header>

  <main id="app" class="wrap"></main>

  <nav class="tab">
    <div class="wrap">
      <a href="#/" data-tab="home"><span class="ic">🏠</span>Início</a>
      <a href="#/jogadores" data-tab="jogadores"><span class="ic">👦</span>Plantel</a>
      <a href="#/exercicios" data-tab="exercicios"><span class="ic">📋</span>Exercícios</a>
      <a href="#/treinos" data-tab="treinos"><span class="ic">🗓️</span>Treinos</a>
      <a href="#/calendario" data-tab="calendario"><span class="ic">📅</span>Calendário</a>
    </div>
  </nav>

  <script src="js/db.js"></script>
  <script src="js/exercicios_base.js"></script>
  <script src="js/ia_treino.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
    window.addEventListener("online", () => document.getElementById("badge-off").hidden = true);
    window.addEventListener("offline", () => document.getElementById("badge-off").hidden = false);
    document.getElementById("badge-off").hidden = navigator.onLine;
  </script>
</body>
</html>
